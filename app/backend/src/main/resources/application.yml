spring:
  application:
    name: green-commit-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greencommit}
    username: ${SPRING_DATASOURCE_USERNAME:greencommit}
    password: ${SPRING_DATASOURCE_PASSWORD:greencommit}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  batch:
    job:
      enabled: false # Repository Batch 잡은 스케줄러가 직접 트리거 (Phase 8)
  security:
    oauth2:
      client:
        registration:
          # BR01: GitHub 계정 필수 회원가입 게이트. "github"는 Spring Security의 내장
          # CommonOAuth2Provider라 client-id/secret/scope 외 authorization-uri 등은 자동 설정된다.
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email,public_repo

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  # 로그인 성공 후 리다이렉트할 프론트엔드 주소 (SCR002, /auth/callback 라우트).
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
